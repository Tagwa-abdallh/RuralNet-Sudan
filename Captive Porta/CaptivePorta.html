<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Captive Portal</title>

<!-- Bootstrap -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
/* ====== BACKGROUND ====== */
body {
  margin: 0;
  height: 100vh;
  display: flex;
  justify-content: center;
  align-items: center;
  font-family: Arial, sans-serif;
  overflow: hidden;
  background: linear-gradient(-45deg, #4facfe, #00f2fe, #a1c4fd, #c2e9fb);
  background-size: 400% 400%;
  animation: gradientMove 10s ease infinite;
}

@keyframes gradientMove {
  0% {background-position: 0% 50%;}
  50% {background-position: 100% 50%;}
  100% {background-position: 0% 50%;}
}

/* ====== WAVES ====== */
.wave {
  position: absolute;
  bottom: 0;
  left: 0;
  width: 200%;
  height: 200px;
  background: rgba(255,255,255,0.2);
  border-radius: 100%;
  animation: waveMove 8s linear infinite;
}

.wave:nth-child(2) {
  bottom: -50px;
  opacity: 0.4;
  animation-duration: 12s;
}

.wave:nth-child(3) {
  bottom: -80px;
  opacity: 0.3;
  animation-duration: 15s;
}

@keyframes waveMove {
  0% {transform: translateX(0);}
  100% {transform: translateX(-50%);}
}

/* ====== CARD ====== */
.login-card {
  width: 100%;
  max-width: 380px;
  border: none;
  border-radius: 18px;
  box-shadow: 0 15px 35px rgba(0,0,0,0.2);
  backdrop-filter: blur(10px);
  background: rgba(255,255,255,0.9);
  z-index: 10;
}

.title {
  font-weight: bold;
}

.btn-custom {
  background: #2b7cff;
  border: none;
}

.btn-custom:hover {
  background: #1f66dd;
}

.error-msg {
  display: none;
}
</style>
</head>

<body>

<!-- waves -->
<div class="wave"></div>
<div class="wave"></div>
<div class="wave"></div>

<!-- card -->
<div class="card login-card p-4 text-center">

  <div class="mb-3">
    <img src="https://cdn-icons-png.flaticon.com/512/1040/1040216.png" width="60">
  </div>

  <h4 class="title mb-2">إدخال كود الإنترنت</h4>
  <p class="text-muted small">يرجى إدخال الكود للوصول إلى الشبكة</p>

  <input type="text" id="codeInput" class="form-control mb-3 text-center" placeholder="أدخل الكود هنا">

  <div id="error" class="alert alert-danger error-msg">
    ❌ الكود غير صحيح
  </div>

  <button class="btn btn-custom text-white w-100" onclick="checkCode()">
    دخول
  </button>

</div>

<script>
function checkCode() {
  const code = document.getElementById("codeInput").value;
  const error = document.getElementById("error");

  if (code === "1234") {
    alert("تم الدخول بنجاح 🚀");
    error.style.display = "none";
  } else {
    error.style.display = "block";
  }
}
</script>

</body>
</html>
