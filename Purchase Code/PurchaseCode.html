<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>شراء كود الإنترنت</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">

  <style>
    body {
      font-family: Arial;
      color: #fff;
      min-height: 100vh;

      /* 🖼️ خلفية جديدة */
      background: url("../img/—Pngtree—concept\ internet\ technology\ business\ and_15533865.png");
      background-size: cover;
      background-position: center;
      background-attachment: fixed;
    }

    .overlay {
      background: rgba(0,0,0,0.65);
      min-height: 100vh;
      padding: 20px;
    }

    .title {
      text-align: center;
      margin: 30px 0;
      font-weight: bold;
      animation: fadeDown 0.8s ease;
    }

    /* ===== Cards Animation ===== */
    .card-box {
      background: rgba(255,255,255,0.1);
      border: none;
      border-radius: 20px;
      backdrop-filter: blur(10px);
      box-shadow: 0 8px 20px rgba(0,0,0,0.4);
      text-align: center;
      padding: 25px;
      transition: 0.3s;
      opacity: 0;
      animation: fadeUp 0.8s ease forwards;
    }

    .card-box:nth-child(1) { animation-delay: 0.2s; }
    .card-box:nth-child(2) { animation-delay: 0.4s; }
    .card-box:nth-child(3) { animation-delay: 0.6s; }

    .card-box:hover {
      transform: translateY(-10px) scale(1.03);
    }

    .icon {
      font-size: 42px;
      margin-bottom: 10px;
      color: #47e5f7;
    }

    h5{
        color: white;
    }
    .price {
      font-size: 20px;
      font-weight: bold;
      margin: 10px 0;
      color: white;
    }

    .btn-buy {
      background: #0d6efd;
      border: none;
      padding: 10px 25px;
      border-radius: 10px;
      color: #fff;
      transition: 0.3s;
    }
    .modal-footer a {
        color : white;
        text-decoration: none;
    } 

    .btn-buy:hover {
      background: #0b5ed7;
      transform: scale(1.05);
    }

    /* ===== Animations ===== */
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(30px); }
      to { opacity: 1; transform: translateY(0); }
    }

    @keyframes fadeDown {
      from { opacity: 0; transform: translateY(-20px); }
      to { opacity: 1; transform: translateY(0); }
    }

  </style>
</head>

<body>

<div class="overlay">

  <div class="container py-4">

    <!-- 🌐 عنوان مع أيقونة إنترنت -->
    <h2 class="title">
      <i class="bi bi-wifi"></i> شراء كود الإنترنت
    </h2>

    <div class="row g-4 justify-content-center">

      <!-- 1 Hour -->
      <div class="col-md-3">
        <div class="card card-box">
          <div class="icon"><i class="bi bi-clock-history"></i></div>
          <h5>1 ساعة</h5>
          <div class="price">5 جنيه</div>
          <button class="btn-buy" data-bs-toggle="modal" data-bs-target="#buyModal" >شراء</button>
        </div>
      </div>

      <!-- 1 Day -->
      <div class="col-md-3">
        <div class="card card-box">
          <div class="icon"><i class="bi bi-calendar-day"></i></div>
          <h5>1 يوم</h5>
          <div class="price">20 جنيه</div>
          <button class="btn-buy" data-bs-toggle="modal" data-bs-target="#buyModal">شراء</button>
        </div>
      </div>

      <!-- 1 Week -->
      <div class="col-md-3">
        <div class="card card-box">
          <div class="icon"><i class="bi bi-calendar-week"></i></div>
          <h5>1 أسبوع</h5>
          <div class="price">100 جنيه</div>
          <button class="btn-buy" data-bs-toggle="modal" data-bs-target="#buyModal">شراء</button>
        </div>
      </div>

    </div>

  </div>
</div>

<!-- 🪟 Modal تأكيد الشراء -->
<div class="modal fade" id="buyModal" tabindex="-1">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content text-dark">

      <div class="modal-header">
        <h5 class="modal-title">تأكيد الشراء</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>

      <div class="modal-body">
        هل تريد تأكيد شراء هذه الباقة؟
        <br>
        سيتم خصم الرصيد مباشرة بعد التأكيد.
      </div>

      <div class="modal-footer">
        <button class="btn btn-secondary" data-bs-dismiss="modal">إلغاء</button>
        <button class="btn btn-primary"><a href="../Dashboard/Dashboard.html">تأكيد الشراء</a></button>
      </div>

    </div>
  </div>
</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
