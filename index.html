<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RuralNet Sudan</title>

<!-- Bootstrap -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<!-- Icons -->
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  direction: rtl;
}

/* الخلفية */
.hero {
  height: 80vh;
  background: linear-gradient(rgba(0,0,0,0.4), rgba(0,0,0,0.4)),
              url(./img/—Pngtree—concept\ of\ global\ internet\ connection_15458555.png);
  background-size: cover;
  background-position: center;
  color: white;
  display: flex;
  align-items: center;
  text-align: center;
}

/* زر */
.btn-main {
  background: #0d6efd;
  border: none;
  padding: 15px;
  font-size: 20px;
  border-radius: 12px;
  width: 100%;
  transition: 0.3s;
}

.btn-main:hover {
  background: #0b5ed7;
  transform: scale(1.05);
}

/* كروت تحت */
.features {
  margin-top: -80px;
}

.feature-box {
  background: white;
  border-radius: 15px;
  padding: 20px;
  text-align: center;
  box-shadow: 0 5px 20px rgba(0,0,0,0.1);
}
</style>

</head>

<body>

<!-- Hero Section -->
<section class="hero">
    
  <div class="container">
    <h1 class="display-4 fw-bold mb-3">
      <i class="bi bi-wifi"></i>
      <br>
      RuralNet Sudan
    </h1>
    

    <p class="lead mb-4">
      إنترنت سريع ومستقر للقرى والمجتمعات الريفية
    </p>

    <div class="col-md-4 mx-auto">
      <a href="./Purchase Code/PurchaseCode.html" class="btn btn-main">
        <i class="bi bi-wifi"></i> اتصل بالإنترنت
      </a>
    </div>

    <p class="mt-3">🔒 اتصال آمن وموثوق</p>

  </div>
</section>

<!-- Features -->
<section class="features container">
  <div class="row g-3">

    <div class="col-md-4">
      <div class="feature-box">
        <i class="bi bi-bar-chart fs-1 text-primary"></i>
        <h5 class="mt-3">تغطية واسعة</h5>
        <p>خدمة متاحة في جميع أنحاء القرية</p>
      </div>
    </div>

    <div class="col-md-4">
      <div class="feature-box">
        <i class="bi bi-lightning fs-1 text-primary"></i>
        <h5 class="mt-3">سرعة عالية</h5>
        <p>استمتع بسرعة إنترنت ثابتة</p>
      </div>
    </div>

    <div class="col-md-4">
      <div class="feature-box">
        <i class="bi bi-people fs-1 text-primary"></i>
        <h5 class="mt-3">للمجتمع</h5>
        <p>مصمم لخدمة المجتمع المحلي</p>
      </div>
    </div>

  </div>
</section>

</body>
</html>
