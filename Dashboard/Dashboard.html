<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Dashboard</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">

  <style>
    body {
      background: #f5f7fb;
      font-family: Arial, sans-serif;
      animation: pageFade 0.8s ease-in;
    }

    /* ===== Page Animation ===== */
    @keyframes pageFade {
      from { opacity: 0; transform: scale(0.98); }
      to { opacity: 1; transform: scale(1); }
    }

    /* ===== Sidebar ===== */
    .sidebar {
      background: #fff;
      height: atuo;
      border-left: 1px solid #eee;
      padding: 20px;
      animation: slideLeft 0.6s ease;
    }

    @keyframes slideLeft {
      from { transform: translateX(50px); opacity: 0; }
      to { transform: translateX(0); opacity: 1; }
    }

    .sidebar a {
      display: block;
      padding: 12px;
      color: #555;
      text-decoration: none;
      border-radius: 10px;
      margin-bottom: 10px;
      transition: 0.3s;
    }

    .sidebar a:hover {
      background: #eef4ff;
      transform: translateX(-5px);
    }

    .sidebar a.active {
      background: #e8f0ff;
      color: #0d6efd;
      font-weight: bold;
    }

    /* ===== Cards ===== */
    .card-box {
      border: none;
      border-radius: 16px;
      box-shadow: 0 5px 15px rgba(0,0,0,0.05);
      transition: 0.4s;
      animation: fadeUp 0.7s ease forwards;
      opacity: 0;
    }

    .card-box:hover {
      transform: translateY(-8px);
      box-shadow: 0 10px 25px rgba(0,0,0,0.1);
    }

    /* Delay animation لكل كارد */
    .card-box:nth-child(1) { animation-delay: 0.2s; }
    .card-box:nth-child(2) { animation-delay: 0.4s; }
    .card-box:nth-child(3) { animation-delay: 0.6s; }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* ===== Progress animation ===== */
    .progress-bar {
      animation: loadBar 1.5s ease-in-out;
    }

    @keyframes loadBar {
      from { width: 0; }
    }

    .big-number {
      font-size: 28px;
      font-weight: bold;
    }
  </style>
</head>

<body>

<div class="container-fluid">
  <div class="row">

    <!-- Sidebar -->
    <div class="col-md-3 sidebar">
      <h4 class="text-primary mb-4">NetControl</h4>

      <a href="../index.html" class="active"><i class="bi bi-house"></i> الرئيسية</a>
      <a href="../Purchase Code/PurchaseCode.html"><i class="bi bi-globe"></i> باقات الإنترنت</a>
      <a><i class="bi bi-person"></i> تفاصيل الحساب</a>
      <a><i class="bi bi-clock"></i> سجل الاستخدام</a>
      <a><i class="bi bi-gear"></i> الإعدادات</a>
      <a class="text-danger"><i class="bi bi-box-arrow-right"></i> تسجيل الخروج</a>
    </div>

    <!-- Main -->
    <div class="col-md-9 p-4">

      <h4>👋 مرحباً بك</h4>
      <p class="text-muted">إليك نظرة على استهلاكك الحالي</p>

      <div class="row g-3">

        <!-- اتصال -->
        <div class="col-md-4">
          <div class="card card-box p-3 text-center">
            <i class="bi bi-wifi fs-1 text-primary"></i>
            <h5 class="mt-2">متصل</h5>
            <small class="text-muted">إشارة قوية</small>
          </div>
        </div>

        <!-- بيانات -->
        <div class="col-md-4">
          <div class="card card-box p-3">
            <h6>استهلاك البيانات</h6>
            <div class="big-number text-success">2.45 GB</div>
            <small>من أصل 10 GB</small>

            <div class="progress mt-3">
              <div class="progress-bar bg-success" style="width: 25%"></div>
            </div>
          </div>
        </div>

        <!-- وقت -->
        <div class="col-md-4">
          <div class="card card-box p-3">
            <h6>الوقت المتبقي</h6>
            <div class="big-number text-primary">02:45:30</div>
            <small>ساعة : دقيقة : ثانية</small>
          </div>
        </div>

      </div>

      <!-- Progress -->
      <div class="card card-box p-3 mt-4">
        <h6>إجمالي الاستخدام</h6>

        <div class="progress mt-2">
          <div class="progress-bar bg-primary" style="width: 35%"></div>
        </div>

        <div class="d-flex justify-content-between mt-2">
          <small>0 GB</small>
          <small>5 GB</small>
          <small>10 GB</small>
        </div>
      </div>

    </div>
  </div>
</div>

</body>
</html>
